services:
    db:
        image: postgis/postgis:15-3.3
        container_name: sr-db
        restart: always
        environment:
            POSTGRES_DB: streetrun_db
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin123
        ports:
            - "5433:5432"
        volumes:
            - postgres_data_v2:/var/lib/postgresql/data

volumes:
    postgres_data_v2:
