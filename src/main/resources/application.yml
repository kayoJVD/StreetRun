spring:
    application:
        name: street-race
    datasource:
        driver-class-name: org.postgresql.Driver
        url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:${POSTGRES_PORT:5433}/${POSTGRES_DB:streetrun_db}
        username: ${POSTGRES_USER:admin}
        password: ${POSTGRES_PASSWORD:admin123}
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true

api:
    security:
        token:
            secret: ${JWT_SECRET:street-run-secret-dev}
